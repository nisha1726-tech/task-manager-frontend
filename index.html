<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Task Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div class="auth-container" id="loginPage">
  <div class="auth-box">
    <h2>🚀 Task Manager</h2>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="Enter email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Enter password">
    </div>
    <button class="btn btn-primary" onclick="login()">Login</button>
    <p class="error-msg hidden" id="loginError"></p>
    <div class="auth-switch">
      Don't have an account? <a onclick="showSignup()">Sign up</a>
    </div>
  </div>
</div>

<!-- SIGNUP -->
<div class="auth-container hidden" id="signupPage">
  <div class="auth-box">
    <h2>📝 Create Account</h2>
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="signupName" placeholder="Enter your name">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="signupEmail" placeholder="Enter email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="signupPassword" placeholder="Enter password">
    </div>
    <div class="form-group">
      <label>Role</label>
      <select id="signupRole">
        <option value="member">Member</option>
        <option value="admin">Admin</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="signup()">Sign Up</button>
    <p class="error-msg hidden" id="signupError"></p>
    <div class="auth-switch">
      Already have an account? <a onclick="showLogin()">Login</a>
    </div>
  </div>
</div>

<script>
 const API = 'https://team-task-manager-production-a356.up.railway.app/api';

  function showSignup() {
    document.getElementById('loginPage').classList.add('hidden');
    document.getElementById('signupPage').classList.remove('hidden');
  }

  function showLogin() {
    document.getElementById('signupPage').classList.add('hidden');
    document.getElementById('loginPage').classList.remove('hidden');
  }

  async function login() {
    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;
    const errEl = document.getElementById('loginError');
    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.message; errEl.classList.remove('hidden'); return; }
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = 'dashboard.html';
    } catch (err) {
      errEl.textContent = 'Server error. Is backend running?';
      errEl.classList.remove('hidden');
    }
  }

  async function signup() {
    const name = document.getElementById('signupName').value;
    const email = document.getElementById('signupEmail').value;
    const password = document.getElementById('signupPassword').value;
    const role = document.getElementById('signupRole').value;
    const errEl = document.getElementById('signupError');
    try {
      const res = await fetch(`${API}/auth/signup`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password, role })
      });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.message; errEl.classList.remove('hidden'); return; }
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = 'dashboard.html';
    } catch (err) {
      errEl.textContent = 'Server error. Is backend running?';
      errEl.classList.remove('hidden');
    }
  }
</script>
</body>
</html>
